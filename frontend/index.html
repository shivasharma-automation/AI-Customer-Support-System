<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Support System</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">
            🤖
        </div>

        <h1>AI Customer Support System</h1>

        <h2>Customer Support Portal</h2>

        <p class="subtitle">
            Submit your support request and our AI assistant will analyze your issue.
        </p>

        <form id="supportForm">

            <div class="input-group">
                <label>Company Name</label>
                <input
                    type="text"
                    id="company"
                    placeholder="Enter company name"
                    required>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                    required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="input-group">
                <label>Subject</label>
                <input
                    type="text"
                    id="subject"
                    placeholder="Brief issue title"
                    required>
            </div>

            <div class="input-group">
                <label>Describe Your Issue</label>

                <textarea
                    id="issue"
                    rows="6"
                    placeholder="Describe your issue..."
                    required></textarea>
            </div>

            <button type="submit">
                Submit Support Request
            </button>

        </form>

        <p class="footer">
            © 2026 AI Customer Support System
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
